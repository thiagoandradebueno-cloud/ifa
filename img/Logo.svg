<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#777777"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="800" height="800" fill="#0D0D0D"/>

  <!-- Shield -->
  <path d="M400 120L600 220V420C600 560 500 660 400 710C300 660 200 560 200 420V220L400 120Z"
        fill="#1A1A1A"
        stroke="url(#gold)"
        stroke-width="12"
        filter="url(#shadow)"/>

  <!-- Helmet -->
  <path d="M320 300C320 220 360 180 400 180C440 180 480 220 480 300V390H320V300Z"
        fill="url(#metal)"
        stroke="url(#gold)"
        stroke-width="10"/>

  <path d="M370 250H430L455 320H345L370 250Z"
        fill="#111111"
        stroke="url(#gold)"
        stroke-width="8"/>

  <!-- Helmet plume -->
  <path d="M400 120C430 140 450 180 450 220C430 200 400 180 350 220C350 180 370 140 400 120Z"
        fill="#C1121F"/>

  <!-- Crossed swords -->
  <g transform="rotate(-25 400 400)">
    <rect x="385" y="100" width="30" height="280" rx="10" fill="url(#metal)"/>
    <rect x="370" y="360" width="60" height="20" rx="5" fill="url(#gold)"/>
  </g>

  <g transform="rotate(25 400 400)">
    <rect x="385" y="100" width="30" height="280" rx="10" fill="url(#metal)"/>
    <rect x="370" y="360" width="60" height="20" rx="5" fill="url(#gold)"/>
  </g>

  <!-- Text -->
  <text x="400" y="560"
        text-anchor="middle"
        font-size="96"
        font-family="Verdana, sans-serif"
        font-weight="900"
        fill="url(#metal)"
        stroke="url(#gold)"
        stroke-width="4"
        filter="url(#shadow)">
    THIAGO
  </text>

  <!-- Glow ring -->
  <circle cx="400" cy="400" r="290"
          stroke="url(#gold)"
          stroke-width="8"
          stroke-dasharray="20 12"
          opacity="0.6"/>
</svg>
